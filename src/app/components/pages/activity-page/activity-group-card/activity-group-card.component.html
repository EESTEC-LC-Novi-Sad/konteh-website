<a [routerLink]="['/aktivnosti', group.id]" class="group-card-link">
  <div class="card">
    <span class="card-number" *ngIf="showNumber">
      {{ (index + 1).toString().padStart(2, '0') }}.
    </span>
    <h3>{{ group.name }}</h3>
    <p class="group-description" [innerHTML]="renderDescription(group.description)"></p>
    <span class="arrow">→</span>
  </div>
</a>
