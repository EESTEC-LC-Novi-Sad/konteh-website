<div class="background-image">
  <div class="header-cover"></div>
  <div class="is-flex is-flex-direction-column has-text-centered activity-section">
    <video
      #bgVideo
      autoplay
      muted
      playsinline
      loop
      [attr.disableRemotePlayback]="true"
      [attr.x-webkit-airplay]="'deny'"
      class="video-bg"
    >
      <source src="/assets/background_video1.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="page_content">

      <div class="max-width-900 auto-margin breadcrumb-nav">
        <a [routerLink]="['/aktivnosti']" class="back-link">← Aktivnosti</a>
      </div>

      <mat-spinner class="auto-margin my-5" *ngIf="groupLoading"></mat-spinner>

      <ng-container *ngIf="!groupLoading">
        <span class="group-type-label">{{ activityGroup.type }}</span>
        <h1 class="title">{{ activityGroup.name }}</h1>
        <p class="group-desc max-width-900 auto-margin" *ngIf="activityGroup.description">
          {{ activityGroup.description }}
        </p>

        <div class="max-width-900 auto-margin mt-5">
          <div *ngFor="let activity of activityGroup.activity" class="mt-4 stretch-width">
            <activity-card [activity]="activity.fields"></activity-card>
          </div>
        </div>
      </ng-container>

    </div>
  </div>
</div>
